name: Diligence evidence tests

on:
  push:
    branches:
      - main
      - codex/due-diligence-evidence-runner
  pull_request:
    branches:
      - main

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install focused test dependencies
        run: python -m pip install pytest pydantic
      - name: Run diligence evidence suite
        env:
          PYTHONPATH: src
        run: >-
          python -m pytest
          tests/test_diligence_evidence.py
          tests/test_diligence_research_adapter.py
          tests/test_diligence_runner.py
          -q
